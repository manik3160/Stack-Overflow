name: CI

on:
  push:
  pull_request:
    branches:
      - main
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
        
    - name: Build Next.js
      run: npm run build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2